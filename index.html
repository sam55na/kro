<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎰 جاك بوت - اللعبة النهائية</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js">
    </script>
    <style>
        /* ============================================================
           التصميم الجديد - الألوان: أصفر، أبيض، أسود، أحمر متدرج
           ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --gold-light: #FFE44D;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --dark-gray: #1A1A1A;
            --red-gradient-start: #DC143C;
            --red-gradient-end: #8B0000;
            --shadow-gold: 0 0 40px rgba(255, 215, 0, 0.2);
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            background: var(--black);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* --- خلفية سوداء مع تدرج أحمر وأصفر --- */
        #gameBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(220, 20, 60, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                var(--black);
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s var(--transition-smooth);
        }

        /* --- شبكة ذهبية متحركة --- */
        .bg-grid-overlay {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 30s linear infinite;
            pointer-events: none;
            will-change: transform;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(80px, 80px) rotate(2deg);
            }
        }

        /* --- جزيئات ذهبية متطايرة --- */
        .gold-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .gold-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold), 0 0 20px rgba(255, 215, 0, 0.2);
            animation: floatParticle linear infinite;
            opacity: 0;
            will-change: transform, opacity;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(0.5);
                opacity: 0;
            }
        }

        /* --- شاشة التحميل --- */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s var(--transition-smooth), visibility 1s var(--transition-smooth);
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--gold-light), var(--gold-dark), var(--gold));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: loadingTitleGlow 2s ease-in-out infinite alternate;
            margin-bottom: 25px;
            text-shadow: 0 0 80px rgba(255, 215, 0, 0.1);
            letter-spacing: 6px;
        }

        @keyframes loadingTitleGlow {
            0% {
                background-position: 0% 50%;
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.1));
            }
            100% {
                background-position: 100% 50%;
                filter: drop-shadow(0 0 60px rgba(255, 215, 0, 0.2));
            }
        }

        .loading-bar-container {
            width: min(500px, 80vw);
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.05);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold-dark));
            background-size: 300% 100%;
            border-radius: 4px;
            transition: width 0.8s var(--transition-smooth);
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: -2px;
            right: 0;
            width: 30px;
            height: calc(100% + 4px);
            background: rgba(255, 255, 255, 0.3);
            filter: blur(8px);
            animation: barGlow 1s ease-in-out infinite alternate;
        }

        @keyframes barGlow {
            0% {
                opacity: 0.3;
                transform: translateX(-30px);
            }
            100% {
                opacity: 0.9;
                transform: translateX(30px);
            }
        }

        .loading-percent {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-top: 20px;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
            font-variant-numeric: tabular-nums;
        }

        .loading-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 10px;
            animation: loadingTextPulse 2s ease-in-out infinite;
        }

        @keyframes loadingTextPulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        .loading-dots {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .loading-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.1);
            animation: dotBounce 1.5s ease-in-out infinite;
            will-change: transform, background, box-shadow;
        }

        .loading-dot:nth-child(1) {
            animation-delay: 0s;
        }
        .loading-dot:nth-child(2) {
            animation-delay: 0.3s;
        }
        .loading-dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.3;
                background: rgba(255, 215, 0, 0.03);
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
                background: var(--gold);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            }
        }

        /* --- الهيدر --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            transition: all 0.3s var(--transition-smooth);
            min-height: 55px;
        }

        .header-title {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .header-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-stat {
            text-align: center;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            transition: all 0.3s ease;
        }

        .header-stat .value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gold);
            font-variant-numeric: tabular-nums;
        }

        .header-stat .label {
            font-size: 0.4rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .user-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.55rem;
            background: rgba(255, 215, 0, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.1);
            color: var(--gold);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .user-badge.admin {
            background: rgba(220, 20, 60, 0.08);
            border-color: rgba(220, 20, 60, 0.15);
            color: #DC143C;
        }

        .admin-toggle {
            padding: 4px 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            border-radius: 20px;
            background: rgba(220, 20, 60, 0.05);
            color: #DC143C;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .admin-toggle:hover {
            background: rgba(220, 20, 60, 0.12);
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.1);
            transform: scale(1.02);
        }

        /* --- مؤقت الإنتظار --- */
        .cooldown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .cooldown-overlay.show {
            display: flex;
            animation: cooldownIn 0.6s var(--transition-smooth);
        }

        @keyframes cooldownIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cooldown-content {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 90%;
            width: 420px;
        }

        .cooldown-content .icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .cooldown-content .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .cooldown-content .subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 18px;
        }

        .cooldown-content .timer {
            font-size: 3.8rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
        }

        /* --- منطقة اللعبة --- */
        #gameArea {
            position: fixed;
            top: 65px;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 10;
        }

        #gameArea.show {
            display: flex;
            animation: gameAreaIn 0.7s var(--transition-smooth);
        }

        @keyframes gameAreaIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .game-header .prize-display {
            font-size: clamp(0.75rem, 1.2vw, 1rem);
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
        }

        .game-header .prize-display .highlight {
            color: var(--gold);
            font-weight: 700;
            font-size: clamp(1.1rem, 2vw, 1.6rem);
            animation: highlightPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes highlightPulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            }
            100% {
                transform: scale(1.05);
                text-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            }
        }

        .attempts-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s var(--transition-smooth);
            will-change: transform, background, border-color, box-shadow;
        }

        .attempt-dot.used {
            background: rgba(220, 20, 60, 0.2);
            border-color: #DC143C;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.1);
            transform: scale(0.8);
        }

        .attempt-dot.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            animation: dotActive 1s ease-in-out infinite alternate;
        }

        @keyframes dotActive {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.3);
            }
        }

        /* --- البطاقات --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(10px, 1.5vw, 18px);
            perspective: 2500px;
            max-width: 720px;
            width: 100%;
            padding: 5px;
        }

        .card-container {
            aspect-ratio: 3/4;
            cursor: pointer;
            perspective: 1200px;
            position: relative;
            transition: all 0.3s var(--transition-smooth);
            will-change: transform;
        }

        .card-container:hover:not(.disabled) .card:not(.flipped) {
            transform: rotateY(15deg) rotateX(8deg) scale(1.04);
            filter: brightness(1.1);
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s var(--transition-smooth);
            border-radius: clamp(10px, 1.5vw, 16px);
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchExplosion 0.8s var(--transition-smooth);
        }

        @keyframes matchExplosion {
            0% {
                transform: rotateY(180deg) scale(1);
            }
            25% {
                transform: rotateY(180deg) scale(1.2) rotate(6deg);
            }
            50% {
                transform: rotateY(180deg) scale(0.95) rotate(-4deg);
            }
            75% {
                transform: rotateY(180deg) scale(1.06) rotate(2deg);
            }
            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: clamp(10px, 1.5vw, 16px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.05);
        }

        /* الوجه الخلفي */
        .card-back {
            background: linear-gradient(145deg, #1a0a0a, #0a0a0a);
            transform: rotateY(0deg);
            border-color: rgba(255, 215, 0, 0.08);
            position: relative;
            padding: 4px;
        }

        .card-back .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: clamp(8px, 1.2vw, 14px);
            display: block;
        }

        .card-back::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: clamp(13px, 1.8vw, 19px);
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.3), transparent, rgba(220, 20, 60, 0.3), transparent);
            animation: flameSpin 4s linear infinite;
            z-index: -1;
        }

        @keyframes flameSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .card-back .fire-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(220, 20, 60, 0.06) 0%, transparent 50%);
            border-radius: clamp(10px, 1.5vw, 16px);
            animation: fireDance 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes fireDance {
            0% {
                opacity: 0.2;
                transform: scale(1) rotate(-2deg);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.04) rotate(2deg);
            }
            100% {
                opacity: 0.3;
                transform: scale(1.01) rotate(-1deg);
            }
        }

        .card-back .card-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 4vw, 3.5rem);
            z-index: 2;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
            animation: iconFloat 3s ease-in-out infinite;
            pointer-events: none;
        }

        /* الوجه الأمامي */
        .card-front {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, rgba(20, 10, 10, 0.95), rgba(5, 5, 5, 0.95));
            border-color: rgba(255, 215, 0, 0.03);
            padding: 12%;
        }

        .card-front .card-symbol-image {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.05));
            animation: symbolPulse 2.5s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes symbolPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.06) rotate(3deg);
            }
        }

        .card-front .symbol-text {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.05);
        }

        .card-container.disabled {
            cursor: not-allowed;
            opacity: 0.4;
            filter: grayscale(0.4);
        }

        .card-container.disabled .card {
            transform: scale(0.95);
        }

        /* --- تأثير الفوز --- */
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
            display: none;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05), transparent 70%);
        }

        .win-overlay.show {
            display: block;
            animation: winFlash 0.5s ease;
        }

        @keyframes winFlash {
            0%,
            100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        /* --- نافذة النتيجة --- */
        #resultModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #resultModal.show {
            display: flex;
            animation: modalIn 0.6s var(--transition-smooth);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.85) rotateY(10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(10, 10, 10, 0.95), rgba(0, 0, 0, 0.95));
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 25px;
            padding: clamp(25px, 4vw, 45px);
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.03), transparent, rgba(220, 20, 60, 0.03), transparent);
            animation: modalSpin 12s linear infinite;
            z-index: 0;
        }

        @keyframes modalSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .modal-content>* {
            position: relative;
            z-index: 1;
        }

        .modal-title {
            font-size: clamp(2rem, 4.5vw, 3.2rem);

    <!-- ============================================================

    <script>
        // ============================================================
        // 1. المتغيرات العامة
        // ============================================================

        const SERVER_URL = 'https://kro-7yvq.onrender.com';
        const ADMIN_ID = '7011476249';

        let socket = null;
        let userId = '';
        let isGameActive = false;
        let isAdmin = false;
        let gameState = null;
        let reconnectAttempts = 0;
        let cooldownInterval = null;
        let audioContext = null;
        const MAX_RECONNECT_ATTEMPTS = 25;

        // ============================================================
        // 2. جزيئات ذهبية
        // ============================================================

        function createGoldParticles() {
            const container = document.getElementById('goldParticles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'gold-particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 30) + 's';
                container.appendChild(particle);
            }
        }
        createGoldParticles();

        // ============================================================
        // 3. نظام الصوت
        // ============================================================

        function initAudio() {
            try {
                audioContext = new(window.AudioContext || window.webkitAudioContext)();
            } catch (_) {}
        }

        function playSound(type) {
            if (!audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                switch (type) {
                    case 'click':
                        oscillator.frequency.value = 880;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.08);
                        break;
                    case 'flip':
                        oscillator.frequency.value = 500;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.06, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.12);
                        break;
                    case 'win':
                        [523, 659, 784, 1047, 1318].forEach((freq, i) => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(audioContext.destination);
                            osc.frequency.value = freq;
                            osc.type = 'sine';
                            gain.gain.setValueAtTime(0.08, audioContext.currentTime + i * 0.13);
                            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + i * 0.13 + 0.2);
                            osc.start(audioContext.currentTime + i * 0.13);
                            osc.stop(audioContext.currentTime + i * 0.13 + 0.2);
                        });
                        break;
                    case 'lose':
                        oscillator.frequency.value = 250;
                        oscillator.type = 'sawtooth';
                        gainNode.gain.setValueAtTime(0.04, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.5);
                        break;
                    case 'match':
                        oscillator.frequency.value = 650;
                        oscillator.type = 'square';
                        gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.15);
                        break;
                }
            } catch (_) {}
        }

        // ============================================================
        // 4. استخراج معرف المستخدم
        // ============================================================

        function getUserIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            // دعم كلا الصيغتين: user_id و user
            const id = params.get('user_id') || params.get('user');
            if (id && id.length > 3) return id;
            const saved = localStorage.getItem('jackpot_user_id');
            if (saved && saved.length > 3) return saved;
            const randomId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
            localStorage.setItem('jackpot_user_id', randomId);
            return randomId;
        }

        userId = getUserIdFromURL();
        isAdmin = (userId === ADMIN_ID);
        localStorage.setItem('jackpot_user_id', userId);

        // ============================================================
        // 5. شاشة التحميل
        // ============================================================

        function updateLoading(progress, text) {
            const bar = document.getElementById('loadingBar');
            const percent = document.getElementById('loadingPercent');
            const label = document.getElementById('loadingText');

            const p = Math.min(Math.max(progress, 0), 100);
            bar.style.width = p + '%';
            percent.textContent = p + '%';
            if (text) label.textContent = text;
        }

        async function showLoading() {
            const screen = document.getElementById('loadingScreen');
            screen.classList.remove('hidden');
            for (let i = 0; i <= 100; i += 0.8) {
                updateLoading(i, `جاري تحميل العالم`);
                await new Promise(r => setTimeout(r, 10 + Math.random() * 12));
            }
        }

        function hideLoading() {
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        // ============================================================
        // 6. دوال الشبكة
        // ============================================================

        async function fetchWithTimeout(url, options = {}, timeout = 12000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal,
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', ...options.headers }
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        async function fetchUserData(userId, retries = 4) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetchWithTimeout(`${SERVER_URL}/api/user/${userId}`, {}, 12000);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                    } else {
                        throw error;
                    }
                }
            }
        }

        // ============================================================
        // 7. الاتصال بالخادم
        // ============================================================

        function connectSocket() {
            if (socket && socket.connected) return;

            updateLoading(45, '🔄 جاري الاتصال بالخادم');

            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: MAX_RECONNECT_ATTEMPTS,
                reconnectionDelay: 2000,
                reconnectionDelayMax: 12000,
                timeout: 18000,
                pingTimeout: 65000,
                pingInterval: 25000,
                upgrade: true,
                forceNew: true
            });

            socket.on('connect', () => {
                reconnectAttempts = 0;
                updateLoading(75, '✅ متصل بالخادم');
                hideToast();
                authenticateUser();
            });

            socket.on('connect_error', (error) => {
                reconnectAttempts++;
                const progress = 50 + Math.min(reconnectAttempts * 2, 30);
                updateLoading(progress, `⚠️ محاولة ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`);
                if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                    showToast('❌ تعذر الاتصال بالخادم', 'error');
                    updateLoading(100, '❌ فشل الاتصال');
                }
            });

            socket.on('disconnect', () => {
                if (isGameActive) {
                    showToast('⚠️ انقطع الاتصال، جاري إعادة المحاولة...', 'info');
                }
            });

            socket.on('reconnect', () => {
                reconnectAttempts = 0;
                updateLoading(90, '✅ أعيد الاتصال');
                setTimeout(hideToast, 2000);
                authenticateUser();
            });

            socket.on('game_started', handleGameStarted);
            socket.on('card_revealed', handleCardRevealed);
            socket.on('game_won', handleGameWon);
            socket.on('game_lost', handleGameLost);
            socket.on('cooldown', handleCooldown);

            socket.on('error', (data) => {
                showToast(data.message || '⚠️ حدث خطأ', 'error');
            });
        }

        // ============================================================
        // 8. مصادقة المستخدم
        // ============================================================

        async function authenticateUser() {
            updateLoading(85, '🔐 جاري التحقق من هويتك');
            socket.emit('join', { userId });

            try {
                const data = await fetchUserData(userId);
                if (data && data.success) {
                    updateLoading(95, '🌟 مرحباً بك!');

                    // تحديث الهيدر للمشرف
                    if (isAdmin) {
                        document.getElementById('userBalance').textContent = data.user.stats?.total_prize_value || 0;
                        document.getElementById('userPlays').textContent = data.user.stats?.total_plays || 0;
                        document.getElementById('userWins').textContent = data.user.stats?.total_wins || 0;
                        document.getElementById('adminStatsHeader').classList.add('show');
                    } else {
                        document.getElementById('adminStatsHeader').classList.remove('show');
                    }

                    const badge = document.getElementById('userBadge');
                    if (data.user.isAdmin) {
                        badge.textContent = '👑 مدير';
                        badge.classList.add('admin');
                        isAdmin = true;
                        document.getElementById('adminToggle').style.display = 'block';
                        loadAdminData();
                    } else {
                        badge.textContent = '🌟 لاعب';
                        badge.classList.remove('admin');
                        document.getElementById('adminToggle').style.display = 'none';
                    }

                    // تحميل الإعدادات
                    await loadSettings();

                    // التحقق من صلاحية اللعب (المدير مستثنى)
                    if (data.user.cooldown?.allowed) {
                        document.getElementById('startGameBtn').style.display = 'block';
                    } else if (data.user.cooldown?.remaining) {
                        showCooldown(data.user.cooldown.remaining);
                    }

                    setTimeout(() => {
                        updateLoading(100, '✅ جاهز للانطلاق!');
                        setTimeout(hideLoading, 400);
                    }, 400);
                }
            } catch (error) {
                updateLoading(90, '⚠️ خطأ في جلب البيانات');
                showToast(`❌ ${error.message || 'فشل الاتصال'}`, 'error');
                setTimeout(() => {
                    if (socket && !socket.connected) socket.connect();
                }, 5000);
            }
        }

        // ============================================================
        // 9. تحميل الإعدادات
        // ============================================================

        async function loadSettings() {
            try {
                const response = await fetchWithTimeout(`${SERVER_URL}/api/settings`, {}, 8000);
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.success) {
                    if (data.settings.background_image?.url) {
                        document.getElementById('gameBackground').style.backgroundImage = `url(${data.settings.background_image.url})`;
                    }
                    if (data.settings.game_title?.text) {
                        document.getElementById('gameTitle').textContent = data.settings.game_title.text;
                    }
                }
            } catch (_) {}
        }

        // ============================================================
        // 10. دوال الحالة
        // ============================================================

        function showToast(message, type = 'error') {
            const el = document.getElementById('errorToast');
            el.textContent = message;
            el.className = 'error-toast show' + (type === 'info' ? ' info' : '');
            clearTimeout(el._hideTimeout);
            el._hideTimeout = setTimeout(() => el.classList.remove('show'), 7000);
        }

        function hideToast() {
            document.getElementById('errorToast').classList.remove('show');
        }

        // ============================================================
        // 11. مؤقت الإنتظار
        // ============================================================

        function showCooldown(remainingHours) {
            const overlay = document.getElementById('cooldownOverlay');
            overlay.classList.add('show');

            let totalSeconds = Math.ceil(Math.max(remainingHours * 3600, 1));

            if (cooldownInterval) clearInterval(cooldownInterval);

            cooldownInterval = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(cooldownInterval);
                    overlay.classList.remove('show');
                    document.getElementById('startGameBtn').style.display = 'block';
                    return;
                }
                totalSeconds--;
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('cooldownTimer').textContent =
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function handleCooldown(data) {
            if (data && data.remaining > 0) {
                showCooldown(data.remaining);
                showToast(data.message || '⏳ يرجى الانتظار', 'info');
            }
        }

        // ============================================================
        // 12. دوال اللعبة
        // ============================================================

        function startGame() {
            if (isGameActive || !socket || !socket.connected) {
                if (!socket || !socket.connected) showToast('❌ غير متصل بالخادم', 'error');
                return;
            }
            hideToast();
            document.getElementById('gameArea').classList.remove('show');
            document.getElementById('cardsGrid').innerHTML = '';
            document.getElementById('attemptsDisplay').innerHTML = '';
            showToast('⏳ جاري تجهيز اللعبة...', 'info');
            socket.emit('join', { userId });
            playSound('click');
        }

        function handleGameStarted(data) {
            if (!data) return;
            hideToast();
            document.getElementById('gameArea').classList.add('show');
            gameState = data;
            isGameActive = true;

            document.getElementById('grandPrize').textContent =
                `${data.prize?.prize_icon || '🔥'} ${data.prize?.prize_value || 10000} SYP`;

            // عرض نقاط المحاولات
            const attemptsDisplay = document.getElementById('attemptsDisplay');
            attemptsDisplay.innerHTML = '';
            for (let i = 0; i < (data.maxAttempts || 5); i++) {
                const dot = document.createElement('div');
                dot.className = 'attempt-dot active';
                attemptsDisplay.appendChild(dot);
            }

            // إنشاء البطاقات
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            const cards = data.cards || [];
            const backImage = data.cardBackImage || 'https://i.imgur.com/card_back.jpg';

            cards.forEach((card, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.dataset.index = index;

                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.index = index;

                const back = document.createElement('div');
                back.className = 'card-face card-back';
                back.innerHTML = `
                            <img class="card-back-image" src="${backImage}" alt="Card Back" loading="lazy">
                            <div class="fire-effect"></div>
                            <div class="card-icon-overlay">🎰</div>
                        `;

                const front = document.createElement('div');
                front.className = 'card-face card-front';
                front.innerHTML = `<div class="symbol-text">${card.symbol || '?'}</div>`;

                cardEl.appendChild(back);
                cardEl.appendChild(front);
                container.appendChild(cardEl);

                container.addEventListener('click', () => revealCard(index));
                grid.appendChild(container);
            });

            document.getElementById('startGameBtn').style.display = 'none';
        }

        function revealCard(index) {
            if (!isGameActive || !gameState) return;
            const card = gameState.cards?.[index];
            if (!card || card.isRevealed || card.isMatched) return;
            playSound('flip');
            socket.emit('reveal_card', { cardId: index });
        }

        function handleCardRevealed(data) {
            if (!data) return;
            const container = document.querySelector(`.card-container[data-index="${data.cardId}"]`);
            if (!container) return;

            const card = container.querySelector('.card');
            card.classList.add('flipped');

            const front = card.querySelector('.card-front');
            if (data.imageUrl) {
                front.innerHTML = `<img class="card-symbol-image" src="${data.imageUrl}" alt="${data.symbol}" loading="lazy">`;
            } else {
                front.innerHTML = `<div class="symbol-text">${data.symbol || '?'}</div>`;
            }

            const dots = document.querySelectorAll('.attempt-dot');
            dots.forEach((dot, i) => {
                const attempts = data.attempts || 0;
                dot.className = i < attempts ? 'attempt-dot used' : 'attempt-dot active';
            });
        }

        function handleGameWon(data) {
            if (!data) return;
            isGameActive = false;
            document.getElementById('startGameBtn').style.display = 'block';
            document.getElementById('startGameBtn').textContent = '🔄 العب مجدداً';
            playSound('win');

            // تأثير الفوز: إخفاء البطاقات غير الرابحة
            const matchedIds = (data.matchedCards || []).map(c => c.id);
            const allCards = document.querySelectorAll('.card-container');
            allCards.forEach((container, index) => {
                if (!matchedIds.includes(index)) {
                    container.style.transition = 'all 0.6s var(--transition-smooth)';
                    setTimeout(() => {
                        container.style.opacity = '0';
                        container.style.transform = 'scale(0.4) rotateY(90deg)';
                        container.style.pointerEvents = 'none';
                    }, 100);
                } else {
                    const card = container.querySelector('.card');
                    card.classList.add('matched');
                    container.style.transform = 'translateY(-10px) scale(1.05)';
                    container.style.boxShadow = '0 20px 60px rgba(255, 215, 0, 0.2)';
                }
            });

            const overlay = document.getElementById('winOverlay');
            overlay.classList.add('show');
            setTimeout(() => overlay.classList.remove('show'), 600);

            showResult(true, data.prize);
            playWinEffect();
            updateUserStats();
        }

        function handleGameLost(data) {
            if (!data) return;
            isGameActive = false;
            document.getElementById('startGameBtn').style.display = 'block';
            document.getElementById('startGameBtn').textContent = '🔄 العب مجدداً';
            playSound('lose');

            const allCards = data.allCards || [];
            allCards.forEach((c, index) => {
                const container = document.querySelector(`.card-container[data-index="${c.id}"]`);
                if (container) {
                    const card = container.querySelector('.card');
                    const front = card.querySelector('.card-front');
                    if (c.imageUrl) {
                        front.innerHTML = `<img class="card-symbol-image" src="${c.imageUrl}" alt="${c.symbol}" loading="lazy">`;
                    } else {
                        front.innerHTML = `<div class="symbol-text">${c.symbol || '?'}</div>`;
                    }
                    setTimeout(() => card.classList.add('flipped'), index * 70);
                }
            });

            setTimeout(() => {
                showResult(false, data.luckyPrize, data.message);
            }, allCards.length * 70 + 600);

            updateUserStats();
        }

        // ============================================================
        // 13. عرض النتيجة
        // ============================================================

        function showResult(isWin, prize, message) {
            const modal = document.getElementById('resultModal');
            const title = document.getElementById('resultTitle');
            const prizeEl = document.getElementById('resultPrize');
            const valueEl = document.getElementById('resultValue');
            const detailEl = document.getElementById('resultDetail');

            title.className = 'modal-title ' + (isWin ? 'win' : 'lose');
            title.textContent = isWin ? '🎉 فوز! تهانينا!' : '🍀 حظ أوفر!';
            prizeEl.textContent = isWin ? (prize?.prize_icon || '🎁') : (prize?.prize_icon || '🍀');
            valueEl.textContent = isWin ? `+${prize?.prize_value || 0} SYP` : `+${prize?.prize_value || 100} SYP`;
            detailEl.textContent = isWin ? `🎁 ${prize?.prize_name || 'جائزة'}` : (message || 'جائزة ترضية');

            modal.classList.add('show');
            if (isWin) playSound('win');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
            document.querySelectorAll('.card-container').forEach(container => {
                container.style.opacity = '1';
                container.style.transform = '';
                container.style.boxShadow = '';
                container.style.pointerEvents = '';
            });
        }

        // ============================================================
        // 14. تحديث الإحصائيات
        // ============================================================

        async function updateUserStats() {
            try {
                const data = await fetchUserData(userId);
                if (data && data.success && isAdmin) {
                    document.getElementById('userBalance').textContent = data.user.stats?.total_prize_value || 0;
                    document.getElementById('userPlays').textContent = data.user.stats?.total_plays || 0;
                    document.getElementById('userWins').textContent = data.user.stats?.total_wins || 0;
                }
            } catch (_) {}
            if (isAdmin) loadAdminData();
        }

        // ============================================================
        // 15. مؤثرات الفوز
        // ============================================================

        function playWinEffect() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = ['#FFD700', '#FFE44D', '#DAA520', '#FFFFFF', '#DC143C', '#FF6B35', '#FFAA00'];
            const shapes = ['■', '●', '▲', '★', '◆', '♥', '♦', '✦'];

            for (let i = 0; i < 160; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                el.style.fontSize = (Math.random() * 22 + 8) + 'px';
                el.style.animationDuration = (Math.random() * 3.5 + 1.8) + 's';
                el.style.animationDelay = (Math.random() * 1.8) + 's';
                container.appendChild(el);
            }
            setTimeout(() => container.remove(), 5500);
        }

        // ============================================================
        // 16. لوحة الإدارة
        // ============================================================

        let adminDataLoaded = false;

        async function loadAdminData() {
            if (!isAdmin) return;
            try {
                const response = await fetchWithTimeout(`${SERVER_URL}/api/admin/stats?userId=${userId}`, {}, 8000);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data && data.success) {
                    adminDataLoaded = true;
                    renderAdminPanel(data);
                }
            } catch (e) {
                document.getElementById('adminContent').innerHTML = `
                            <div style="color:#DC143C; text-align:center; padding:20px;">
                                ❌ فشل تحميل البيانات
                            </div>
                        `;
            }
        }

        function renderAdminPanel(data) {
            const stats = data.stats || {};
            const global = stats.global || {};
            const topPlayers = stats.topPlayers || [];
            const allPrizes = stats.allPrizes || [];
            const lucky = stats.luckyPrize || { name: '🍀 حظ أوفر', value: 100 };

            let html = `
                        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px;">
                            <div style="background:rgba(255,215,0,0.03); padding:12px; border-radius:10px; border:1px solid rgba(255,215,0,0.05); text-align:center;">
                                <div style="font-size:1.5rem; font-weight:700; color:var(--gold);">${global.total_plays || 0}</div>
                                <div style="font-size:0.55rem; color:rgba(255,255,255,0.2);">إجمالي الجولات</div>
                            </div>
                            <div style="background:rgba(255,215,0,0.03); padding:12px; border-radius:10px; border:1px solid rgba(255,215,0,0.05); text-align:center;">
                                <div style="font-size:1.5rem; font-weight:700; color:var(--gold);">${global.total_wins || 0}</div>
                                <div style="font-size:0.55rem; color:rgba(255,255,255,0.2);">إجمالي الفوز</div>
                            </div>
                            <div style="background:rgba(255,215,0,0.03); padding:12px; border-radius:10px; border:1px solid rgba(255,215,0,0.05); text-align:center;">
                                <div style="font-size:1.5rem; font-weight:700; color:#DC143C;">${global.total_losses || 0}</div>
                                <div style="font-size:0.55rem; color:rgba(255,255,255,0.2);">إجمالي الخسارة</div>
                            </div>
                            <div style="background:rgba(255,215,0,0.03); padding:12px; border-radius:10px; border:1px solid rgba(255,215,0,0.05); text-align:center;">
                                <div style="font-size:1.5rem; font-weight:700; color:var(--gold);">${global.total_prizes || 0}</div>
                                <div style="font-size:0.55rem; color:rgba(255,255,255,0.2);">إجمالي الجوائز</div>
                            </div>
                        </div>
                        <div style="margin-bottom:14px;">
                            <div style="font-size:0.65rem; color:rgba(255,215,0,0.3); margin-bottom:6px;">🏆 أفضل اللاعبين</div>
                            ${topPlayers.length > 0 ? topPlayers.slice(0, 5).map((p, i) => `
                                <div style="display:flex; justify-content:space-between; padding:5px 10px; border-bottom:1px solid rgba(255,215,0,0.02); font-size:0.55rem;">
                                    <span style="color:var(--gold);">${i+1}. ${p.user_id}</span>
                                    <span style="color:var(--gold);">${p.total_prize_value || 0} SYP</span>
                                </div>
                            `).join('') : '<div style="text-align:center; color:rgba(255,255,255,0.1); font-size:0.65rem;">لا توجد بيانات</div>'}
                        </div>
                        <div style="margin-bottom:14px;">
                            <div style="font-size:0.65rem; color:rgba(255,215,0,0.3); margin-bottom:6px;">🎯 الجوائز (4 جوائز)</div>
                            ${allPrizes.slice(0, 4).map(p => `
                                <div style="display:flex; justify-content:space-between; padding:4px 10px; border-bottom:1px solid rgba(255,215,0,0.02); font-size:0.55rem;">
                                    <span>${p.prize_icon || '🎁'} ${p.prize_name || 'جائزة'}</span>
                                    <span style="color:var(--gold);">${p.prize_value || 0} SYP</span>
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-bottom:14px; padding:10px; background:rgba(255,215,0,0.02); border-radius:10px; border:1px solid rgba(255,215,0,0.05);">
                            <div style="font-size:0.65rem; color:rgba(255,215,0,0.3); margin-bottom:4px;">🍀 جائزة حظ أوفر</div>
                            <div style="display:flex; justify-content:space-between; font-size:0.6rem;">
                                <span>${lucky.name || '🍀 حظ أوفر'}</span>
                                <span style="color:var(--gold);">${lucky.value || 100} SYP</span>
                            </div>
                        </div>
                        <button class="modal-btn" onclick="refreshAdminData()" style="width:100%; padding:10px; font-size:0.65rem; margin-top:0;">🔄 تحديث البيانات</button>
                    `;
            document.getElementById('adminContent').innerHTML = html;
        }

        function refreshAdminData() {
            document.getElementById('adminContent').innerHTML =
                '<div style="color:rgba(255,215,0,0.2); text-align:center; padding:20px;">⏳ جاري التحديث...</div>';
            loadAdminData();
        }

        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open') && !adminDataLoaded) {
                loadAdminData();
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('open');
        }

        // ============================================================
        // 17. ملء الشاشة
        // ============================================================

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // ============================================================
        // 18. تهيئة الصفحة
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('adminToggle').addEventListener('click', toggleAdminPanel);
            document.getElementById('startGameBtn').addEventListener('click', startGame);
            initAudio();
            showLoading();
            connectSocket();
        });

        // تحديث دوري
        setInterval(() => {
            if (isAdmin && document.getElementById('adminPanel').classList.contains('open')) {
                loadAdminData();
            }
        }, 35000);

        setInterval(() => {
            if (socket && !socket.connected) {
                socket.connect();
            }
        }, 12000);

        console.log('🎰 جاك بوت - النسخة النهائية');
        console.log(`👤 المستخدم: ${userId} | 👑 مدير: ${isAdmin}`);
        console.log(`🔗 الخادم: ${SERVER_URL}`);
    </script>

</body>
</html>
