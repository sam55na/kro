<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 جاك بوت</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js">
    </script>
    <style>
        /* ============================================================
           التصميم الكامل - جاك بوت
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --gold: #FFD700;
            --gold-dark: #DAA520;
            --gold-light: #FFE44D;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --dark-gray: #1A1A1A;
            --red: #DC143C;
            --red-dark: #8B0000;
            --shadow-gold: 0 0 40px rgba(255, 215, 0, 0.15);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            background: var(--black);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            user-select: none;
            touch-action: manipulation;
        }

        /* --- الخلفية --- */
        #gameBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(220, 20, 60, 0.08) 0%, transparent 50%),
                var(--black);
        }

        .bg-grid {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 25s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(60px, 60px) rotate(2deg);
            }
        }

        /* --- جزيئات ذهبية --- */
        .gold-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .gold-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold);
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(0.5);
                opacity: 0;
            }
        }

        /* --- شاشة التحميل --- */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.02);
            }
        }

        .loading-bar-container {
            width: min(400px, 80vw);
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            transition: width 0.6s var(--transition);
        }

        .loading-percent {
            font-size: 1.2rem;
            color: var(--gold);
            margin-top: 15px;
            font-variant-numeric: tabular-nums;
        }

        .loading-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 10px;
            letter-spacing: 4px;
        }

        .loading-dots {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.1);
            animation: dotBounce 1.5s ease-in-out infinite;
        }

        .loading-dot:nth-child(1) {
            animation-delay: 0s;
        }
        .loading-dot:nth-child(2) {
            animation-delay: 0.3s;
        }
        .loading-dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.3;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
                background: var(--gold);
            }
        }

        /* --- الهيدر --- */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.05);
            min-height: 55px;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-stat {
            text-align: center;
            padding: 2px 10px;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 6px;
            border: 1px solid rgba(255, 215, 0, 0.03);
        }

        .header-stat .value {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold);
        }

        .header-stat .label {
            font-size: 0.35rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.5rem;
            background: rgba(255, 215, 0, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.1);
            color: var(--gold);
        }

        .user-badge.admin {
            background: rgba(220, 20, 60, 0.08);
            border-color: rgba(220, 20, 60, 0.15);
            color: var(--red);
        }

        .admin-toggle {
            padding: 4px 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            border-radius: 20px;
            background: rgba(220, 20, 60, 0.05);
            color: var(--red);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.45rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-toggle:hover {
            background: rgba(220, 20, 60, 0.12);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.05);
        }

        /* --- مؤقت الإنتظار --- */
        .cooldown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .cooldown-overlay.show {
            display: flex;
            animation: cooldownIn 0.5s ease;
        }

        @keyframes cooldownIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cooldown-content {
            text-align: center;
            padding: 35px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            max-width: 90%;
            width: 380px;
        }

        .cooldown-content .icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .cooldown-content .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .cooldown-content .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
        }

        .cooldown-content .timer {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
            font-variant-numeric: tabular-nums;
            letter-spacing: 3px;
        }

        /* --- منطقة اللعبة --- */
        #gameArea {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 10;
        }

        #gameArea.show {
            display: flex;
            animation: gameAreaIn 0.6s ease;
        }

        @keyframes gameAreaIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .game-header .prize-display {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .game-header .prize-display .highlight {
            color: var(--gold);
            font-weight: 700;
            font-size: 1.2rem;
            animation: highlightPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes highlightPulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            }
            100% {
                transform: scale(1.05);
                text-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            }
        }

        .attempts-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s var(--transition);
        }

        .attempt-dot.used {
            background: rgba(220, 20, 60, 0.2);
            border-color: var(--red);
            transform: scale(0.8);
        }

        .attempt-dot.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold);
            animation: dotActive 1s ease-in-out infinite alternate;
        }

        @keyframes dotActive {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.3);
            }
        }

        /* --- البطاقات - إصلاح الوجه الأمامي والخلفي --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            perspective: 2000px;
            max-width: 680px;
            width: 100%;
            padding: 5px;
        }

        .card-container {
            aspect-ratio: 3/4;
            cursor: pointer;
            perspective: 1000px;
            position: relative;
            transition: all 0.3s var(--transition);
        }

        .card-container:hover:not(.disabled) .card:not(.flipped) {
            transform: rotateY(15deg) rotateX(8deg) scale(1.04);
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            will-change: transform;
        }

        /* ✅ عند قلب البطاقة */
        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchExplosion 0.7s var(--transition);
        }

        @keyframes matchExplosion {
            0% {
                transform: rotateY(180deg) scale(1);
            }
            25% {
                transform: rotateY(180deg) scale(1.15) rotate(6deg);
            }
            50% {
                transform: rotateY(180deg) scale(0.95) rotate(-4deg);
            }
            75% {
                transform: rotateY(180deg) scale(1.05) rotate(2deg);
            }
            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.05);
        }

        /* ✅ الوجه الخلفي (يظهر قبل القلب) */
        .card-back {
            background: linear-gradient(145deg, #1a0a0a, #0a0a0a);
            transform: rotateY(0deg);
            border-color: rgba(255, 215, 0, 0.08);
            position: relative;
        }

        .card-back .card-back-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .card-back::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 14px;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.3), transparent, rgba(220, 20, 60, 0.3), transparent);
            animation: flameSpin 4s linear infinite;
            z-index: -1;
        }

        @keyframes flameSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .card-back .fire-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(220, 20, 60, 0.05) 0%, transparent 50%);
            border-radius: 12px;
            animation: fireDance 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes fireDance {
            0% {
                opacity: 0.2;
                transform: scale(1) rotate(-2deg);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.04) rotate(2deg);
            }
            100% {
                opacity: 0.3;
                transform: scale(1.01) rotate(-1deg);
            }
        }

        /* ✅ الوجه الأمامي (يظهر بعد القلب) */
        .card-front {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, rgba(20, 10, 10, 0.95), rgba(5, 5, 5, 0.95));
            border-color: rgba(255, 215, 0, 0.03);
            padding: 15%;
        }

        .card-front .card-symbol-image {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.05));
        }

        .card-front .symbol-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
        }

        .card-container.disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        /* --- تأثيرات الحركة --- */
        .card-container.falling {
            animation: cardFall 0.6s var(--transition) forwards;
        }

        @keyframes cardFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotateX(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(120px) rotateX(90deg) scale(0.8);
            }
        }

        .card-container.selected {
            animation: cardSelected 0.5s var(--transition) forwards;
        }

        @keyframes cardSelected {
            0% {
                transform: translateY(0) scale(1);
                box-shadow: 0 0 0 rgba(255, 215, 0, 0);
            }
            50% {
                transform: translateY(-15px) scale(1.08);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            }
            100% {
                transform: translateY(-8px) scale(1.04);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            }
        }

        .card-container.winner {
            animation: cardWinner 1s var(--transition) forwards;
        }

        @keyframes cardWinner {
            0% {
                transform: translateY(-8px) scale(1.04);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            }
            30% {
                transform: translateY(-20px) scale(1.15);
                box-shadow: 0 0 80px rgba(255, 215, 0, 0.4);
            }
            60% {
                transform: translateY(-10px) scale(1.08);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
            }
            100% {
                transform: translateY(-12px) scale(1.1);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.25);
            }
        }

        /* --- تأثير الفوز --- */
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
            display: none;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05), transparent 70%);
        }

        .win-overlay.show {
            display: block;
            animation: winFlash 0.5s ease;
        }

        @keyframes winFlash {
            0%,
            100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

        /* --- نافذة النتيجة --- */
        #resultModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #resultModal.show {
            display: flex;
            animation: modalIn 0.5s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) rotateY(10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(10, 10, 10, 0.95), rgba(0, 0, 0, 0.95));
            border: 1px solid rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.03), transparent, rgba(220, 20, 60, 0.03), transparent);
            animation: modalSpin 10s linear infinite;
            z-index: 0;
        }

        @keyframes modalSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .modal-content>* {
            position: relative;
            z-index: 1;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .modal-title.win {
            background: linear-gradient(45deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: winTitlePulse 1s ease-in-out infinite alternate;
        }

        @keyframes winTitlePulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.05);
            }
        }

        .modal-title.lose {
            color: var(--red);
            animation: loseTitlePulse 1s ease-in-out infinite alternate;
        }

        @keyframes loseTitlePulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(0.96);
            }
        }

        .modal-prize {
            font-size: 4rem;
            margin: 10px 0;
        }

        .modal-prize-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
        }

        .modal-detail {
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
        }

        .modal-btn {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: var(--black);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        /* --- زر البدء --- */
        .btn-start {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: var(--black);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.15);
            display: none;
            animation: btnPulse 2s ease-in-out infinite alternate;
        }

        @keyframes btnPulse {
            0% {
                transform: translateX(-50%) scale(1);
            }
            100% {
                transform: translateX(-50%) scale(1.02);
            }
        }

        .btn-start:hover {
            transform: translateX(-50%) scale(1.05);

    <!-- ============================================================
    جافا سكريبت - النسخة النهائية
    ============================================================ -->
    <script>
        // ============================================================
        // 1. المتغيرات العامة
        // ============================================================

        const SERVER_URL = 'https://kro-7yvq.onrender.com';
        const ADMIN_ID = '7011476249';

        let socket = null;
        let userId = '';
        let isGameActive = false;
        let isAdmin = false;
        let gameState = null;
        let reconnectAttempts = 0;
        let cooldownInterval = null;
        let audioContext = null;
        let isGameReady = false;
        const MAX_RECONNECT_ATTEMPTS = 25;

        // ============================================================
        // 2. جزيئات ذهبية
        // ============================================================

        function createGoldParticles() {
            const container = document.getElementById('goldParticles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'gold-particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 30) + 's';
                container.appendChild(particle);
            }
        }
        createGoldParticles();

        // ============================================================
        // 3. نظام الصوت
        // ============================================================

        function initAudio() {
            try {
                audioContext = new(window.AudioContext || window.webkitAudioContext)();
            } catch (_) {}
        }

        function playSound(type) {
            if (!audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                switch (type) {
                    case 'click':
                        oscillator.frequency.value = 880;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.08);
                        break;
                    case 'flip':
                        oscillator.frequency.value = 500;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.06, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.12);
                        break;
                    case 'win':
                        [523, 587, 659, 784, 880, 1047].forEach((freq, i) => {
                            setTimeout(() => {
                                const osc = audioContext.createOscillator();
                                const gain = audioContext.createGain();
                                osc.connect(gain);
                                gain.connect(audioContext.destination);
                                osc.frequency.value = freq;
                                osc.type = 'sine';
                                gain.gain.setValueAtTime(0.08, audioContext.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.001, audioContext
                                    .currentTime + 0.2);
                                osc.start(audioContext.currentTime);
                                osc.stop(audioContext.currentTime + 0.2);
                            }, i * 130);
                        });
                        break;
                    case 'lose':
                        oscillator.frequency.value = 250;
                        oscillator.type = 'sawtooth';
                        gainNode.gain.setValueAtTime(0.04, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.5);
                        break;
                    case 'select':
                        oscillator.frequency.value = 700;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.1);
                        break;
                    case 'fall':
                        oscillator.frequency.value = 300;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.03, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.3);
                        break;
                    case 'arrange':
                        oscillator.frequency.value = 550;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.04, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.15);
                        break;
                }
            } catch (_) {}
        }

        // ============================================================
        // 4. استخراج معرف المستخدم
        // ============================================================

        function getUserIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('user_id') || params.get('user');
            if (id && id.length > 3) return id;
            const saved = localStorage.getItem('jackpot_user_id');
            if (saved && saved.length > 3) return saved;
            const randomId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
            localStorage.setItem('jackpot_user_id', randomId);
            return randomId;
        }

        userId = getUserIdFromURL();
        isAdmin = (userId === ADMIN_ID);
        localStorage.setItem('jackpot_user_id', userId);

        // ============================================================
        // 5. شاشة التحميل
        // ============================================================

        function updateLoading(progress, text) {
            const bar = document.getElementById('loadingBar');
            const percent = document.getElementById('loadingPercent');
            const label = document.getElementById('loadingText');

            const p = Math.min(Math.max(progress, 0), 100);
            bar.style.width = p + '%';
            percent.textContent = p + '%';
            if (text) label.textContent = text;
        }

        async function showLoading() {
            const screen = document.getElementById('loadingScreen');
            screen.classList.remove('hidden');
            for (let i = 0; i <= 100; i += 1) {
                updateLoading(i, `جاري تحميل العالم`);
                await new Promise(r => setTimeout(r, 12 + Math.random() * 10));
            }
        }

        function hideLoading() {
            document.getElementById('loadingScreen').classList.add('hidden');
        }

        // ============================================================
        // 6. دوال الشبكة
        // ============================================================

        async function fetchWithTimeout(url, options = {}, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal,
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        async function fetchUserData(userId, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetchWithTimeout(`${SERVER_URL}/api/user/${userId}`, {}, 10000);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i < retries - 1) await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                    else throw error;
                }
            }
        }

        // ============================================================
        // 7. الاتصال بالخادم
        // ============================================================

        function connectSocket() {
            if (socket && socket.connected) return;

            updateLoading(45, '🔄 جاري الاتصال بالخادم');

            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: MAX_RECONNECT_ATTEMPTS,
                reconnectionDelay: 2000,
                reconnectionDelayMax: 10000,
                timeout: 15000,
                pingTimeout: 60000,
                pingInterval: 25000
            });

            socket.on('connect', () => {
                reconnectAttempts = 0;
                updateLoading(75, '✅ متصل بالخادم');
                hideToast();
                authenticateUser();
            });

            socket.on('connect_error', () => {
                reconnectAttempts++;
                const progress = 50 + Math.min(reconnectAttempts * 2, 30);
                updateLoading(progress, `⚠️ محاولة ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`);
                if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                    showToast('❌ تعذر الاتصال بالخادم', 'error');
                    updateLoading(100, '❌ فشل الاتصال');
                }
            });

            socket.on('disconnect', () => {
                if (isGameActive) showToast('⚠️ انقطع الاتصال', 'info');
            });

            socket.on('reconnect', () => {
                reconnectAttempts = 0;
                updateLoading(90, '✅ أعيد الاتصال');
                authenticateUser();
            });

            socket.on('game_started', handleGameStarted);
            socket.on('card_revealed', handleCardRevealed);
            socket.on('game_won', handleGameWon);
            socket.on('game_lost', handleGameLost);
            socket.on('cooldown', handleCooldown);

            socket.on('error', (data) => {
                showToast(data.message || '⚠️ حدث خطأ', 'error');
            });
        }

        // ============================================================
        // 8. مصادقة المستخدم والتحقق من صلاحية اللعب
        // ============================================================

        async function authenticateUser() {
            updateLoading(85, '🔐 جاري التحقق');

            try {
                const data = await fetchUserData(userId);
                if (data && data.success) {
                    updateLoading(95, '🌟 مرحباً بك!');

                    const isAdminUser = data.user.isAdmin === true;

                    if (isAdminUser) {
                        document.getElementById('userBalance').textContent = data.user.stats?.total_prize_value || 0;
                        document.getElementById('userPlays').textContent = data.user.stats?.total_plays || 0;
                        document.getElementById('userWins').textContent = data.user.stats?.total_wins || 0;
                        document.getElementById('adminStatsHeader').classList.add('show');
                    } else {
                        document.getElementById('adminStatsHeader').classList.remove('show');
                    }

                    const badge = document.getElementById('userBadge');
                    if (isAdminUser) {
                        badge.textContent = '👑 مدير';
                        badge.classList.add('admin');
                        isAdmin = true;
                        document.getElementById('adminToggle').style.display = 'block';
                        setTimeout(() => {
                            loadAdminDashboard();
                        }, 500);
                    } else {
                        badge.textContent = '🌟 لاعب';
                        badge.classList.remove('admin');
                        document.getElementById('adminToggle').style.display = 'none';
                    }

                    // ✅ التحقق من صلاحية اللعب
                    updateGameButtonState(data.user);

                    setTimeout(() => {
                        updateLoading(100, '✅ جاهز!');
                        setTimeout(hideLoading, 300);
                    }, 300);
                }
            } catch (error) {
                updateLoading(90, '⚠️ خطأ في جلب البيانات');
                showToast(`❌ ${error.message}`, 'error');
                setTimeout(() => {
                    if (socket && !socket.connected) socket.connect();
                }, 5000);
            }
        }

        // ============================================================
        // 9. تحديث حالة زر البدء
        // ============================================================

        function updateGameButtonState(userData) {
            const btn = document.getElementById('startGameBtn');
            const isAdminUser = userData?.isAdmin || isAdmin;

            // ✅ التحقق من شرط الإيداع
            const depositCheck = userData?.depositCheck || { allowed: true };
            const cooldown = userData?.cooldown || { allowed: true };

            // ✅ المستخدم مؤهل للعب إذا:
            // 1. هو مدير OR
            // 2. شرط الإيداع مسموح AND فترة الإنتظار مسموحة
            const canPlay = isAdminUser ||
                (depositCheck.allowed === true && cooldown.allowed === true);

            // ✅ إخفاء منطقة اللعبة
            document.getElementById('gameArea').classList.remove('show');

            if (canPlay) {
                // ✅ زر نشط
                btn.style.display = 'block';
                btn.classList.remove('disabled');
                btn.textContent = '🚀 ابدأ المغامرة';
                btn.onclick = startGame;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
                isGameReady = true;
            } else {
                // ✅ زر معطل
                btn.style.display = 'block';
                btn.classList.add('disabled');
                btn.textContent = '⏳ غير مؤهل للعب';
                btn.onclick = null;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                isGameReady = false;

                // ✅ عرض سبب عدم الأهلية
                let reason = '';
                if (!depositCheck.allowed) {
                    reason = `⚠️ يجب أن يكون لديك إيداع بقيمة ${depositCheck.required || 1000} SYP على الأقل`;
                } else if (!cooldown.allowed) {
                    reason = `⏳ يمكنك اللعب بعد ${Math.ceil(cooldown.remaining)} ساعة`;
                }
                if (reason) {
                    showToast(reason, 'info');
                    // ✅ إظهار العداد في زر البدء
                    if (!cooldown.allowed && cooldown.remaining) {
                        showCooldown(cooldown.remaining);
                    }
                }
            }
        }

        // ============================================================
        // 10. دوال الحالة والإشعارات
        // ============================================================

        function showToast(message, type = 'error') {
            const el = document.getElementById('errorToast');
            el.textContent = message;
            el.className = 'error-toast show' + (type === 'info' ? ' info' : '');
            clearTimeout(el._hideTimeout);
            el._hideTimeout = setTimeout(() => el.classList.remove('show'), 6000);
        }

        function hideToast() {
            document.getElementById('errorToast').classList.remove('show');
        }

        // ============================================================
        // 11. مؤقت الإنتظار
        // ============================================================

        function showCooldown(remainingHours) {
            const overlay = document.getElementById('cooldownOverlay');
            overlay.classList.add('show');

            let totalSeconds = Math.ceil(Math.max(remainingHours * 3600, 1));

            if (cooldownInterval) clearInterval(cooldownInterval);

            cooldownInterval = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(cooldownInterval);
                    overlay.classList.remove('show');
                    document.getElementById('startGameBtn').style.display = 'block';
                    document.getElementById('startGameBtn').classList.remove('disabled');
                    document.getElementById('startGameBtn').textContent = '🚀 ابدأ المغامرة';
                    document.getElementById('startGameBtn').onclick = startGame;
                    return;
                }
                totalSeconds--;
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('cooldownTimer').textContent =
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function handleCooldown(data) {
            if (data && data.remaining > 0) {
                showCooldown(data.remaining);
                showToast(data.message || '⏳ يرجى الانتظار', 'info');
                // ✅ تعطيل زر البدء
                const btn = document.getElementById('startGameBtn');
                btn.classList.add('disabled');
                btn.textContent = '⏳ انتظر...';
                btn.onclick = null;
            }
        }

        // ============================================================
        // 12. دوال اللعبة
        // ============================================================

        function startGame() {
            // ✅ التحقق من الأهلية قبل بدء اللعبة
            if (!isGameReady) {
                showToast('❌ غير مؤهل للعب', 'error');
                return;
            }

            if (isGameActive || !socket || !socket.connected) {
                if (!socket || !socket.connected) showToast('❌ غير متصل بالخادم', 'error');
                return;
            }

            hideToast();

            // ✅ إظهار منطقة اللعبة
            document.getElementById('gameArea').classList.add('show');
            document.getElementById('cardsGrid').innerHTML = '';
            document.getElementById('attemptsDisplay').innerHTML = '';

            showToast('⏳ جاري تجهيز اللعبة...', 'info');
            socket.emit('join', { userId });
            playSound('click');

            // ✅ إخفاء زر البدء أثناء اللعب
            document.getElementById('startGameBtn').style.display = 'none';
        }

        function handleGameStarted(data) {
            if (!data) return;
            hideToast();

            // ✅ التأكد من أن منطقة اللعبة ظاهرة
            document.getElementById('gameArea').classList.add('show');

            gameState = data;
            isGameActive = true;

            document.getElementById('grandPrize').textContent =
                `${data.prize?.prize_icon || '🔥'} ${data.prize?.prize_value || 10000} SYP`;

            const attemptsDisplay = document.getElementById('attemptsDisplay');
            attemptsDisplay.innerHTML = '';
            for (let i = 0; i < (data.maxAttempts || 5); i++) {
                const dot = document.createElement('div');
                dot.className = 'attempt-dot active';
                attemptsDisplay.appendChild(dot);
            }

            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            const cards = data.cards || [];
            const backImage = data.cardBackImage || 'https://i.imgur.com/card_back.jpg';
            const cardImages = data.cardImages || [];

            cards.forEach((card, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.dataset.index = index;

                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.index = index;

                // ✅ الوجه الخلفي
                const back = document.createElement('div');
                back.className = 'card-face card-back';
                back.innerHTML = `
                            <img class="card-back-image" src="${backImage}" alt="Card Back" loading="lazy">
                            <div class="fire-effect"></div>
                        `;

                // ✅ الوجه الأمامي - يظهر الرمز بشكل واضح
                const front = document.createElement('div');
                front.className = 'card-face card-front';
                const img = cardImages.find(c => c.symbol === card.symbol);
                if (img && img.image_url) {
                    front.innerHTML = `<img class="card-symbol-image" src="${img.image_url}" alt="${card.symbol}" loading="lazy">`;
                } else {
                    front.innerHTML = `<div class="symbol-text">${card.symbol || '?'}</div>`;
                }

                cardEl.appendChild(back);
                cardEl.appendChild(front);
                container.appendChild(cardEl);
                container.addEventListener('click', () => revealCard(index));
                grid.appendChild(container);
            });

            document.getElementById('startGameBtn').style.display = 'none';
        }

        function revealCard(index) {
            if (!isGameActive || !gameState) return;
            const card = gameState.cards?.[index];
            if (!card || card.isRevealed || card.isMatched) return;
            playSound('flip');
            socket.emit('reveal_card', { cardId: index });
        }

        function handleCardRevealed(data) {
            if (!data) return;
            const container = document.querySelector(`.card-container[data-index="${data.cardId}"]`);
            if (!container) return;

            const card = container.querySelector('.card');
            container.classList.add('selected');
            playSound('select');

            // ✅ قلب البطاقة
            card.classList.add('flipped');

            // ✅ تحديث الوجه الأمامي بالرمز
            const front = card.querySelector('.card-front');
            if (data.imageUrl) {
                front.innerHTML = `<img class="card-symbol-image" src="${data.imageUrl}" alt="${data.symbol}" loading="lazy">`;
            } else {
                front.innerHTML = `<div class="symbol-text">${data.symbol || '?'}</div>`;
            }

            const dots = document.querySelectorAll('.attempt-dot');
            dots.forEach((dot, i) => {
                const attempts = data.attempts || 0;
                dot.className = i < attempts ? 'attempt-dot used' : 'attempt-dot active';
            });
        }

        function handleGameWon(data) {
            if (!data) return;
            isGameActive = false;
            playSound('win');

            const matchedIds = (data.matchedCards || []).map(c => c.id);
            const allContainers = document.querySelectorAll('.card-container');

            // ✅ سقوط البطاقات غير الرابحة
            allContainers.forEach((container, index) => {
                if (!matchedIds.includes(index)) {
                    setTimeout(() => {
                        container.classList.add('falling');
                        playSound('fall');
                    }, index * 150);
                }
            });

            // ✅ ترتيب البطاقات الرابحة
            setTimeout(() => {
                const matchedContainers = [];
                allContainers.forEach((container, index) => {
                    if (matchedIds.includes(index)) {
                        matchedContainers.push(container);
                        container.classList.add('winner');
                        container.classList.remove('selected');
                    }
                });

                matchedContainers.forEach((container, i) => {
                    setTimeout(() => {
                        container.style.transform =
                            `translateX(${(i - (matchedContainers.length - 1) / 2) * 80}px) translateY(-20px) scale(1.1)`;
                        container.style.zIndex = '10';
                        playSound('arrange');
                    }, i * 200);
                });

                // ✅ عرض النتيجة
                setTimeout(() => {
                    const overlay = document.getElementById('winOverlay');
                    overlay.classList.add('show');
                    setTimeout(() => overlay.classList.remove('show'), 500);

                    showResult(true, data.prize);
                    playWinEffect();
                    updateUserStats();

                    // ✅ إعادة زر البدء بعد انتهاء اللعبة
                    document.getElementById('startGameBtn').style.display = 'block';
                    document.getElementById('startGameBtn').textContent = '🔄 العب مجدداً';
                    document.getElementById('startGameBtn').classList.remove('disabled');
                    document.getElementById('startGameBtn').onclick = startGame;

                    // ✅ إخفاء البطاقات بعد 3 ثواني
                    setTimeout(() => {
                        document.getElementById('gameArea').classList.remove('show');
                        document.getElementById('cardsGrid').innerHTML = '';
                    }, 3000);
                }, matchedContainers.length * 200 + 500);

            }, allContainers.length * 150 + 300);
        }

        function handleGameLost(data) {
            if (!data) return;
            isGameActive = false;
            playSound('lose');

            const allCards = data.allCards || [];
            allCards.forEach((c, index) => {
                const container = document.querySelector(`.card-container[data-index="${c.id}"]`);
                if (container) {
                    const card = container.querySelector('.card');
                    const front = card.querySelector('.card-front');
                    if (c.imageUrl) {
                        front.innerHTML = `<img class="card-symbol-image" src="${c.imageUrl}" alt="${c.symbol}" loading="lazy">`;
                    } else {
                        front.innerHTML = `<div class="symbol-text">${c.symbol || '?'}</div>`;
                    }
                    setTimeout(() => {
                        card.classList.add('flipped');
                        container.classList.add('selected');
                        playSound('flip');
                    }, index * 120);
                }
            });

            // ✅ سقوط جميع البطاقات
            setTimeout(() => {
                document.querySelectorAll('.card-container').forEach((container, index) => {
                    setTimeout(() => {
                        container.classList.add('falling');
                        playSound('fall');
                    }, index * 100);
                });
            }, allCards.length * 120 + 300);

            // ✅ عرض النتيجة
            setTimeout(() => {
                showResult(false, null, '😅 لم يتطابق 3 رموز، حظ أوفر في المرة القادمة!');
                updateUserStats();

                // ✅ إعادة زر البدء
                document.getElementById('startGameBtn').style.display = 'block';
                document.getElementById('startGameBtn').textContent = '🔄 العب مجدداً';
                document.getElementById('startGameBtn').classList.remove('disabled');
                document.getElementById('startGameBtn').onclick = startGame;

                // ✅ إخفاء البطاقات
                setTimeout(() => {
                    document.getElementById('gameArea').classList.remove('show');
                    document.getElementById('cardsGrid').innerHTML = '';
                }, 3000);
            }, allCards.length * 120 + allCards.length * 100 + 600);
        }

        // ============================================================
        // 13. عرض النتيجة
        // ============================================================

        function showResult(isWin, prize, message) {
            const modal = document.getElementById('resultModal');
            const title = document.getElementById('resultTitle');
            const prizeEl = document.getElementById('resultPrize');
            const valueEl = document.getElementById('resultValue');
            const detailEl = document.getElementById('resultDetail');

            title.className = 'modal-title ' + (isWin ? 'win' : 'lose');
            title.textContent = isWin ? '🎉 فوز! تهانينا!' : '😅 حظ أوفر!';
            prizeEl.textContent = isWin ? (prize?.prize_icon || '🎁') : '🍀';
            valueEl.textContent = isWin ? `+${prize?.prize_value || 0} SYP` : '0 SYP';
            detailEl.textContent = isWin ? `🎁 ${prize?.prize_name || 'جائزة'}` : (message || 'لم يتطابق 3 رموز');

            modal.classList.add('show');
            if (isWin) playSound('win');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
        }

        // ============================================================
        // 14. تحديث الإحصائيات
        // ============================================================

        async function updateUserStats() {
            try {
                const data = await fetchUserData(userId);
                if (data && data.success && isAdmin) {
                    document.getElementById('userBalance').textContent = data.user.stats?.total_prize_value || 0;
                    document.getElementById('userPlays').textContent = data.user.stats?.total_plays || 0;
                    document.getElementById('userWins').textContent = data.user.stats?.total_wins || 0;
                }
                // ✅ تحديث حالة زر البدء بعد اللعب
                if (data && data.success) {
                    updateGameButtonState(data.user);
                }
            } catch (_) {}
            if (isAdmin) loadAdminDashboard();
        }

        // ============================================================
        // 15. مؤثرات الفوز
        // ============================================================

        function playWinEffect() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = ['#FFD700', '#FFE44D', '#DAA520', '#FFFFFF', '#DC143C', '#FF6B35'];
            const shapes = ['■', '●', '▲', '★', '◆', '♥', '♦'];

            for (let i = 0; i < 150; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                el.style.fontSize = (Math.random() * 22 + 8) + 'px';
                el.style.animationDuration = (Math.random() * 3.5 + 1.8) + 's';
                el.style.animationDelay = (Math.random() * 1.8) + 's';
                container.appendChild(el);
            }
            setTimeout(() => container.remove(), 5500);
        }

        // ============================================================
        // 16. لوحة الإدارة - Dashboard (مختصرة)
        // ============================================================

        async function loadAdminDashboard() {
            const content = document.getElementById('adminContent');

            try {
                const response = await fetchWithTimeout(`${SERVER_URL}/api/admin/stats?userId=${userId}`, {}, 10000);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (!data || !data.success) {
                    content.innerHTML = `
                                <div style="color:#DC143C; text-align:center; padding:20px; font-size:0.8rem;">
                                    ❌ فشل تحميل الإحصائيات
                                </div>
                            `;
                    return;
                }

                const stats = data.stats || {};
                const global = stats.global || {};
                const topPlayers = stats.topPlayers || [];

                let html = `
                            <div class="stats-grid">
                                <div class="stats-card">
                                    <div class="number">${global.total_plays || 0}</div>
                                    <div class="label">إجمالي الجولات</div>
                                </div>
                                <div class="stats-card success">
                                    <div class="number">${global.total_wins || 0}</div>
                                    <div class="label">إجمالي الفوز</div>
                                </div>
                                <div class="stats-card danger">
                                    <div class="number">${global.total_losses || 0}</div>
                                    <div class="label">إجمالي الخسارة</div>
                                </div>
                                <div class="stats-card">
                                    <div class="number">${global.total_prizes || 0}</div>
                                    <div class="label">إجمالي الجوائز</div>
                                </div>
                            </div>
                            <div style="font-size:0.6rem; color:rgba(255,215,0,0.3); margin:10px 0 5px;">🏆 أفضل اللاعبين</div>
                            <div class="admin-table-wrapper">
                                <table class="admin-table">
                                    <thead>
                                        <tr><th>#</th><th>المستخدم</th><th>الجولات</th><th>الجوائز</th></tr>
                                    </thead>
                                    <tbody>
                                `;

                topPlayers.slice(0, 5).forEach((p, i) => {
                    html += `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><code style="color:var(--gold); font-size:0.5rem;">${p.user_id}</code></td>
                                    <td>${p.total_plays || 0}</td>
                                    <td style="color:var(--gold);">${p.total_prize_value || 0} SYP</td>
                                </tr>
                            `;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                            <button class="admin-btn-block" onclick="loadAdminDashboard()">🔄 تحديث</button>
                        `;

                content.innerHTML = html;

            } catch (error) {
                console.error('❌ Dashboard error:', error);
                content.innerHTML = `
                            <div style="color:#DC143C; text-align:center; padding:20px; font-size:0.8rem;">
                                ❌ حدث خطأ
                            </div>
                        `;
            }
        }

        // ============================================================
        // 17. فتح وإغلاق لوحة الإدارة
        // ============================================================

        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                loadAdminDashboard();
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('open');
        }

        // ============================================================
        // 18. تهيئة الصفحة
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('adminToggle').addEventListener('click', toggleAdminPanel);

            // ✅ زر البدء - يتم تفعيله بعد التحقق من الأهلية
            const btn = document.getElementById('startGameBtn');
            btn.onclick = startGame;

            initAudio();
            showLoading();
            connectSocket();
        });

        // ✅ تحديث دوري لحالة الزر
        setInterval(async () => {
            try {
                const data = await fetchUserData(userId);
                if (data && data.success) {
                    updateGameButtonState(data.user);
                }
            } catch (_) {}
        }, 30000);

        setInterval(() => {
            if (socket && !socket.connected) socket.connect();
        }, 10000);

        console.log('🎰 جاك بوت - النسخة النهائية مع جميع الإصلاحات');
        console.log(`👤 المستخدم: ${userId} | 👑 مدير: ${isAdmin}`);
        console.log(`🔗 الخادم: ${SERVER_URL}`);
    </script>

</body>
